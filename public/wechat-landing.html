<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沁瓣 · 押花小铺</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background:
      linear-gradient(180deg, rgba(16,29,19,.55), rgba(16,29,19,.35)),
      url("https://pressed-flower-shop.vercel.app/brand/qinban-meadow.jpg") center/cover no-repeat,
      #3a4e3d;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; color: #fff;
  }
  .card {
    background: rgba(255,255,255,.16); backdrop-filter: blur(18px);
    border-radius: 26px; border: 1px solid rgba(255,255,255,.35);
    padding: 40px 28px 32px; max-width: 340px; width: 100%;
  }
  .logo { font-size: 56px; margin-bottom: 6px }
  h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px }
  .slogan { font-size: 15px; opacity: .88; margin-bottom: 28px; line-height: 1.6 }
  .btn {
    display: block; width: 100%; padding: 16px 0;
    border-radius: 16px; border: none; font-size: 18px; font-weight: 600;
    cursor: pointer; margin-bottom: 14px; transition: transform .15s;
  }
  .btn:active { transform: scale(.97) }
  .primary {
    background: #fff; color: #2b3b2b;
    box-shadow: 0 8px 28px rgba(0,0,0,.24);
  }
  .secondary {
    background: rgba(255,255,255,.18); color: #fff;
    border: 1.5px solid rgba(255,255,255,.45);
  }
  .tip { font-size: 12px; opacity: .62; margin-top: 4px }
  a { color: #fff; text-decoration: none }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌸</div>
  <h1>沁瓣</h1>
  <p class="slogan">手工押花 · 自然之美<br>每一片花瓣都有自己的故事</p>

  <a href="https://qinban.site" class="btn primary">浏览押花作品</a>

  <button class="btn secondary" onclick="copyUrl()">
    复制链接给朋友
  </button>

  <p class="tip">如果页面无法打开，请点右上角「…」→「在浏览器中打开」</p>
</div>

<script>
function copyUrl() {
  navigator.clipboard.writeText('https://qinban.site').then(() => {
    alert('链接已复制！qinban.site');
  }).catch(() => {});
}
// 自动引导跳转
setTimeout(() => {
  window.location.href = 'https://qinban.site';
}, 800);
</script>
</body>
</html>
